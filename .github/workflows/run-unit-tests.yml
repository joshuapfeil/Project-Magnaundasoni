name: Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: write

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: bash ci/scripts/linux_setup.sh

      - name: Set up Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S native -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMAGNAUNDASONI_BUILD_TESTS=ON \
            -DMAGNAUNDASONI_ENABLE_SIMD=OFF \
            -DMAGNAUNDASONI_ENABLE_RT=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S native -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DMAGNAUNDASONI_BUILD_TESTS=ON `
            -DMAGNAUNDASONI_ENABLE_SIMD=OFF `
            -DMAGNAUNDASONI_ENABLE_RT=OFF

      - name: Build tests (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --config Release --target magnaundasoni_tests --parallel

      - name: Build tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release --target magnaundasoni_tests --parallel

      - name: Run unit tests (Linux)
        if: runner.os == 'Linux'
        working-directory: build
        run: ctest --build-config Release --output-on-failure --parallel 1 -R magnaundasoni

      - name: Run unit tests (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        shell: pwsh
        run: ctest --build-config Release --output-on-failure --parallel 1 -R magnaundasoni

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: build/Testing/
          retention-days: 7
